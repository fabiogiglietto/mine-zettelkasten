name: Update vault

on:
  # Pipeline chain (see PIPELINE.md). fg-zettelkasten runs twice:
  #   pipeline-summarize (from toread)    -> `summarize`, then kick research-radio
  #   pipeline-finalize  (from github.io) -> `update` (themes, notes, Slack)
  repository_dispatch:
    types: [pipeline-summarize, pipeline-finalize]
  schedule:
    - cron: "0 5 * * *"      # daily fallback in case a dispatch is missed
    - cron: "0 4 * * 1"      # weekly Mon 04:00 UTC — refresh topics + recluster
  workflow_dispatch:
    inputs:
      recluster:
        description: "Force a full recluster"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write          # deploy the Quartz site to GitHub Pages
  id-token: write       # required by actions/deploy-pages

# Avoid overlapping runs (dispatch + cron)
concurrency:
  group: update-vault
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google service-account credentials
        run: printf '%s' '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: ./credentials.json
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ "${{ github.event.action }}" = "pipeline-summarize" ]; then
            python -m src.main summarize
          elif [ "${{ github.event.schedule }}" = "0 4 * * 1" ] || [ "${{ inputs.recluster }}" = "true" ]; then
            python -m src.main refresh-topics
            python -m src.main update --recluster
          else
            python -m src.main update
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vault/ data/
          git diff --staged --quiet || git commit -m "🤖 Update vault $(date -u +%Y-%m-%dT%H:%MZ)"
          git push

      # Summarize leg only: kick research-radio so it builds the podcast from
      # the summary just committed. The update leg ends the chain — no dispatch.
      - name: Trigger research-radio
        if: github.event.action == 'pipeline-summarize'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.PIPELINE_DISPATCH_TOKEN }}
          repository: fabiogiglietto/research-radio
          event-type: pipeline-tick

      # Publish the vault as a public website (Quartz -> GitHub Pages).
      # Built fresh from the working tree just committed above; the generated
      # HTML is never committed.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Export vault to Quartz content
        run: python -m src.main export-site

      - name: Build Quartz site
        working-directory: quartz
        run: |
          npm ci
          npx quartz build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
