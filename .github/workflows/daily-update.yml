name: Daily vault update

# Runs the incremental `update` pipeline once a day: fetch the toread feed,
# process new/changed papers, and commit the regenerated notes back to main.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   ANTHROPIC_API_KEY       Anthropic API key
#   GOOGLE_CREDENTIALS_JSON full contents of the Drive service-account JSON
#   GOOGLE_DRIVE_FOLDER_ID  Paperpile PDFs folder id

on:
  schedule:
    # GitHub Actions cron is always UTC. 06:00 UTC; for ~06:00 Italian time
    # use '0 4 * * *' (CEST) / '0 5 * * *' (CET).
    - cron: '0 6 * * *'
  workflow_dispatch: {}

# Never let two daily runs overlap.
concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # commit + push the regenerated notes
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google service-account credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: printf '%s' "$GOOGLE_CREDENTIALS_JSON" > credentials.json

      - name: Run the incremental update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/credentials.json
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: python -m src.main update

      - name: Commit and push new notes
        run: |
          if [[ -z "$(git status --porcelain vault data)" ]]; then
            echo "no changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vault data
          git commit -m "Daily update: $(date -u +%F)"
          git push
