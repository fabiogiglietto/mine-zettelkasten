name: Skill bundle

# Keep zettel-paper-skill.zip (the upload bundle for Claude.ai / Cowork) in sync
# with its source under .claude/skills/zettel-paper/. Runs only when the skill
# source changes on main, rebuilds the zip, and commits it back if it differs.
on:
  push:
    branches: [main]
    paths:
      - ".claude/skills/zettel-paper/**"
  workflow_dispatch:

permissions:
  contents: write

# Serialize with itself; the bot commit below can't recurse (pushes made with
# GITHUB_TOKEN don't trigger workflows) and touches only the zip at the repo root.
concurrency:
  group: skill-bundle
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Rebuild bundle
        run: |
          rm -f zettel-paper-skill.zip
          ( cd .claude/skills && zip -rqX ../../zettel-paper-skill.zip zettel-paper -x '*/.*' '.*' )

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zettel-paper-skill.zip
          if git diff --staged --quiet; then
            echo "Bundle already up to date — nothing to commit."
          else
            git commit -m "🤖 Rebuild zettel-paper skill bundle"
            git pull --rebase origin main
            git push
          fi
